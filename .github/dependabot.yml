# Dependabot — atualizacoes automaticas mensais.
# Ecossistemas: NuGet (raiz da solucao), GitHub Actions e Docker (5 servicos).
#
# As versoes NuGet sao centralizadas em Directory.Packages.props (CPM), entao o
# Dependabot edita um arquivo unico e atualiza todos os projetos de uma vez. Os
# grupos abaixo evitam o NU1605 (package downgrade) que ocorria quando pacotes
# correlacionados subiam em PRs separados.
version: 2
updates:
  # --- Dependencias .NET / NuGet (solucao inteira a partir da raiz) ---
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      # Familias que compartilham versao entre si; separar os PRs gera downgrade.
      aspnetcore-e-extensions:
        patterns:
          - "Microsoft.AspNetCore.*"
          - "Microsoft.Extensions.*"
      entity-framework:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
          - "Npgsql.EntityFrameworkCore.*"
      aspire:
        patterns:
          - "Aspire.Hosting.*"
      opentelemetry:
        patterns:
          - "OpenTelemetry.*"
      testes:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet.collector"
          - "FluentAssertions"
          - "Testcontainers.*"
    ignore:
      # Client alinhado ao servidor Elasticsearch 8.15.3 (infra/k8s/base/elasticsearch.yaml).
      # O client 9.x envia media-type compatible-with=9, que o ES 8.x rejeita
      # ("Invalid media-type value"). Subir so com o servidor.
      - dependency-name: "Elastic.Clients.Elasticsearch"
        versions: [">=9.0.0"]
    labels:
      - "dependencies"
      - "nuget"

  # --- Actions usadas nos workflows ---
  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      # Um PR por rodada em vez de um por action.
      actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"

  # --- Imagens base dos 5 Dockerfiles ---
  # Os 5 servicos compartilham a mesma imagem base .NET; um unico bloco com
  # `directories` + grupo faz o bump virar 1 PR em vez de 5.
  - package-ecosystem: "docker"
    directories:
      - "/src/ConexaoSolidaria.Identity.Api"
      - "/src/ConexaoSolidaria.Campaigns.Api"
      - "/src/ConexaoSolidaria.Donations.Worker"
      - "/src/ConexaoSolidaria.Gateway"
      - "/src/ConexaoSolidaria.Web"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      imagens-base:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "docker"
