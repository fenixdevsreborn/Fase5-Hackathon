# =============================================================================
# OpenTelemetry Collector - Conexao Solidaria
# -----------------------------------------------------------------------------
# Imagem sugerida: otel/opentelemetry-collector-contrib
# Recebe traces/metricas/logs OTLP dos servicos (.NET / ServiceDefaults ja
# exportam OTLP quando OTEL_EXPORTER_OTLP_ENDPOINT esta definido) e:
#   - expoe as metricas para o Prometheus fazer scrape em :8889;
#   - imprime um resumo no log (debug) para inspecao rapida.
#
# COMO APONTAR OS SERVICOS PARA O COLLECTOR
#   Defina em cada servico (identity-api, campaigns-api, donations-worker) a env:
#     OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317   (gRPC)
#   ou, para HTTP:
#     OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
#     OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
#   O AddOpenTelemetryExporters() do ServiceDefaults so liga o exporter OTLP
#   quando essa variavel existe (hoje, sem ela, so o Aspire Dashboard local le).
# =============================================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Agrupa spans/metricas em lotes antes de exportar (reduz overhead).
  batch:
    timeout: 5s
    send_batch_size: 1024
  # Protege o collector contra picos de memoria.
  memory_limiter:
    check_interval: 2s
    limit_percentage: 80
    spike_limit_percentage: 25
  # Adiciona metadados uteis (ambiente) a todos os sinais.
  resource:
    attributes:
      - key: deployment.environment
        value: conexao-solidaria
        action: upsert

exporters:
  # Metricas OTLP -> formato Prometheus, expostas em :8889/metrics para scrape.
  prometheus:
    endpoint: 0.0.0.0:8889
    send_timestamps: true
    resource_to_telemetry_conversion:
      enabled: true
  # Traces -> Grafana Tempo via OTLP/gRPC (tempo:4317). tls.insecure para o demo
  # (comunicacao interna do compose, sem certificados).
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  # Saida de diagnostico no stdout do collector (util no demo/troubleshooting).
  debug:
    verbosity: normal

extensions:
  # Endpoint de liveness/readiness do proprio collector (:13133).
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug]
