# =============================================================================
# Grafana Tempo - Conexao Solidaria (config minima, single-binary)
# -----------------------------------------------------------------------------
# Recebe spans via OTLP/gRPC do OTel Collector (exporter otlp/tempo -> tempo:4317)
# e serve a API de consulta em :3200, usada pelo datasource Tempo do Grafana.
# Armazenamento local em disco (/var/tempo) para o cenario de POC/demo.
# =============================================================================

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        # Porta interna do compose onde o Collector entrega os traces.
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  # Flush rapido para os traces aparecerem quase em tempo real na demo.
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
