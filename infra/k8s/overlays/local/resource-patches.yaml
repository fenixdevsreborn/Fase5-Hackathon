# Fallback local: expoe o Gateway via NodePort (30080) para quando nao houver
# nginx ingress controller instalado. A base prefere ClusterIP + Ingress.
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
---
# Fallback local: expoe o Web via NodePort (30088).
apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30088
---
# Elasticsearch mais leve para a maquina de desenvolvimento.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
spec:
  template:
    spec:
      containers:
        - name: elasticsearch
          env:
            - name: ES_JAVA_OPTS
              value: -Xms256m -Xmx256m
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 768Mi
---
# imagePullPolicy: Always nas 5 imagens de aplicacao. As imagens agora vem do
# Docker Hub (junonn5/conexao-solidaria-<svc>:latest); com Always, o rollout que o
# Keel dispara ao detectar novo digest de :latest baixa de fato a imagem atualizada.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-api
spec:
  template:
    spec:
      containers:
        - name: identity-api
          imagePullPolicy: Always
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: campaigns-api
spec:
  template:
    spec:
      containers:
        - name: campaigns-api
          imagePullPolicy: Always
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: donations-worker
spec:
  template:
    spec:
      containers:
        - name: donations-worker
          imagePullPolicy: Always
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  template:
    spec:
      containers:
        - name: gateway
          imagePullPolicy: Always
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  template:
    spec:
      containers:
        - name: web
          imagePullPolicy: Always
