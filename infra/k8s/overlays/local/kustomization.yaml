apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: conexao-solidaria

resources:
  - ../../base

# Tags das imagens locais (build com Docker Desktop). Trocar aqui para apontar
# para um registry/tag diferente sem editar a base.
images:
  - name: conexao-solidaria/identity-api
    newTag: local
  - name: conexao-solidaria/campaigns-api
    newTag: local
  - name: conexao-solidaria/donations-worker
    newTag: local
  - name: conexao-solidaria/gateway
    newTag: local
  - name: conexao-solidaria/web
    newTag: local

# Ajustes especificos do ambiente local (Docker Desktop):
#  - expoe Gateway e Web via NodePort (fallback sem nginx ingress controller);
#  - reduz o consumo do Elasticsearch para caber na maquina de desenvolvimento.
patches:
  - path: resource-patches.yaml

# Opcao alternativa ao Secret externo: descomente para gerar o Secret pelo Kustomize
# a partir de um .env local (NAO versionar o .env). Mantido comentado porque o fluxo
# padrao aplica infra/k8s/secret.yaml separadamente.
# secretGenerator:
#   - name: conexao-solidaria-secret
#     envs:
#       - secret.env
# generatorOptions:
#   disableNameSuffixHash: true
