# Template do Secret do Kubernetes.
# Copie para secret.yaml, preencha os placeholders <...> e NAO versione secret.yaml.
# Aplique com: kubectl apply -f infra/k8s/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: conexao-solidaria-secret
  namespace: conexao-solidaria
type: Opaque
stringData:
  postgres-password: <defina-uma-senha-forte>
  jwt-secret: <gere-um-segredo-com-no-minimo-64-caracteres>
  rabbitmq-user: <defina-um-usuario>
  rabbitmq-password: <defina-uma-senha-forte>
  # Usuario do POSTGRES do Zabbix (NAO o login da UI, que e Admin/zabbix de fabrica).
  # Valor fixo 'zabbix': e o role criado pelo postgres-init em base/postgres.yaml.
  # Qualquer outro valor deixa o zabbix-server/web em loop de
  # '**** PostgreSQL server is not available' (o Postgres responde 'role does not exist').
  zabbix-user: zabbix
  zabbix-password: <defina-uma-senha-forte>
  grafana-admin-user: admin
  grafana-admin-password: <defina-uma-senha-forte>
  # Senha do gestor inicial semeado pela Identity.Api (Seed:Gestor). Se vazia, o seed e ignorado.
  seed-gestor-password: <defina-uma-senha-forte>
  # OPCIONAL: chave da OpenAI para as features de IA do Web (Assistente Solidario +
  # criacao assistida de campanhas). Vazia = app sobe normal com as features ocultas.
  openai-api-key: ""
